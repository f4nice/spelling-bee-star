services:
  mysql:
    image: mysql:8.4
    container_name: booklearner-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: booklearner-root
      MYSQL_DATABASE: booklearner
      MYSQL_USER: booklearner
      MYSQL_PASSWORD: booklearner-pass
    ports:
      - "3306:3306"
    volumes:
      - booklearner_mysql:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

volumes:
  booklearner_mysql:
