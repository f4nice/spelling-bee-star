<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BookLearner</title>
    <link rel="stylesheet" href="/booklearner/assets/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">BookLearner</p>
          <h1>书本学习提炼器</h1>
        </div>
        <div class="status-pill" id="healthStatus">本地运行</div>
      </header>

      <section class="workspace">
        <aside class="query-panel">
          <div class="tabs" role="tablist" aria-label="分析方式">
            <button class="tab active" id="searchTab" type="button">书名搜索</button>
            <button class="tab" id="textTab" type="button">上传书籍</button>
          </div>

          <form class="form active" id="searchForm">
            <label for="query">书名或作者</label>
            <div class="search-field">
              <div class="input-row">
                <input id="query" name="query" autocomplete="off" placeholder="Pride and Prejudice" />
                <button type="submit">分析</button>
              </div>
              <div class="suggestions-panel" id="suggestionsPanel" role="listbox" hidden></div>
            </div>
            <div class="quick-list" aria-label="示例书名">
              <button type="button" data-query="Pride and Prejudice">Pride and Prejudice</button>
              <button type="button" data-query="Jane Eyre">Jane Eyre</button>
              <button type="button" data-query="The Great Gatsby">The Great Gatsby</button>
            </div>
          </form>

          <form class="form" id="textForm">
            <label for="textTitle">书名</label>
            <input id="textTitle" name="title" placeholder="例如：The Secret Garden" />
            <label for="textAuthor">作者</label>
            <input id="textAuthor" name="author" placeholder="可留空" />
            <label for="bookFile">书籍文件</label>
            <input id="bookFile" name="file" type="file" accept=".txt,.epub,text/plain,application/epub+zip" />
            <label for="sourceText">书籍正文</label>
            <textarea id="sourceText" name="text" placeholder="上传 txt 会自动填入正文；上传 epub 可直接分析，也可以粘贴你有权学习使用的英文原文"></textarea>
            <button class="wide-button" type="submit">分析书籍</button>
          </form>

          <div class="notice" id="notice">
            输入书名后会优先查找公版全文；未找到全文时不会生成原文语录。
          </div>

          <section class="history-box">
            <div class="history-head">
              <h2>学习记录</h2>
              <button id="refreshHistory" type="button" aria-label="刷新学习记录">刷新</button>
            </div>
            <ul class="history-list" id="historyList">
              <li>MySQL 启用后显示记录。</li>
            </ul>
          </section>
        </aside>

        <section class="results" id="results">
          <div class="empty-state">
            <h2>等待分析</h2>
            <p>结果会在这里整理成短句、难词和阅读关注点。</p>
          </div>
        </section>
      </section>
    </main>

    <template id="loadingTemplate">
      <div class="loading">
        <div class="spinner" aria-hidden="true"></div>
        <p>正在读取并分析书籍...</p>
      </div>
    </template>

    <script src="/booklearner/assets/app.js" type="module"></script>
  </body>
</html>
