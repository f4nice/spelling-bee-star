services:
  mysql:
    image: mysql:8.4
    container_name: spelling-bee-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: spelling_bee
      MYSQL_USER: spelling
      MYSQL_PASSWORD: spelling
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

volumes:
  mysql_data:
