{% extends "base.html" %}

{% block content %}
<section class="panel upload-panel stacked-panel">
  <div>
    <h1>新增单词表</h1>
    <p>填写单词表名称，上传 Excel 后先预览，再选择行列确认导入。</p>
  </div>

  <form action="/upload" method="post" enctype="multipart/form-data" class="upload-form wide-form">
    <label>
      单词表名称
      <input type="text" name="word_list_name" placeholder="例如：词源词汇 2060" required>
    </label>

    <label>
      导入到已有单词表
      <select name="word_list_id">
        <option value="">新建单词表</option>
        {% for word_list in word_lists %}
          <option value="{{ word_list.id }}">{{ word_list.name }}</option>
        {% endfor %}
      </select>
    </label>

    <label>
      Excel 文件
      <input type="file" name="file" accept=".xlsx,.xlsm,.xltx,.xltm" required>
    </label>

    <button type="submit">上传并预览</button>
  </form>
</section>
{% endblock %}
