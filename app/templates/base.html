<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
  </head>
  <body>
    <header class="app-topbar">
      <a class="app-brand" href="/">
        <span class="brand-mark">拼</span>
        <span>{{ app_name }}</span>
      </a>
      <button class="menu-toggle" type="button" aria-label="缩放页面" data-toggle-shell>☰</button>
      <div class="daily-quote">
        {% if daily_quote %}
          {{ daily_quote.content }}{% if daily_quote.author %}<span> - {{ daily_quote.author }}</span>{% endif %}
        {% else %}
          每天记住一个词，就是给未来多开一扇窗。
        {% endif %}
      </div>
    </header>

    <div class="app-layout" data-app-layout>
      <aside class="sidebar">
        <nav class="side-nav">
          <a href="/">首页</a>
          <a href="/upload">新增单词表</a>
          <div class="side-section">学习</div>
          <a href="/">我的单词表</a>
          <a href="/upload">上传预览</a>
        </nav>
      </aside>
      <main class="shell">
        {% block content %}{% endblock %}
      </main>
    </div>

    <script>
      const layout = document.querySelector('[data-app-layout]');
      const toggle = document.querySelector('[data-toggle-shell]');
      toggle.addEventListener('click', () => {
        layout.classList.toggle('sidebar-collapsed');
      });
    </script>
  </body>
</html>
