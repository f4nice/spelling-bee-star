<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='/speakeasy-mouth-logo.svg') }}">
    <link rel="shortcut icon" href="{{ url_for('static', path='/speakeasy-mouth-logo.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}?v={{ static_version }}">
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <script id="speakeasy-shell-context" type="application/json">{{ shell_context | tojson }}</script>
    {% block content %}{% endblock %}
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
